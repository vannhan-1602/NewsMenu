syntax = "proto3";

option csharp_namespace = "NewsMenu.Presentation.gRPC.Protos";
package news;

service NewsService {
  //NEWS CRUD
  rpc CreateNews (CreateNewsRequest) returns (CreateNewsResponse);
  rpc UpdateNews (UpdateNewsRequest) returns (BaseResponse);
  rpc DeleteNews (DeleteRequest) returns (BaseResponse);
  rpc GetNewsById (GetNewsByIdRequest) returns (GetNewsByIdResponse);
  rpc GetNewsList (GetNewsListRequest) returns (GetNewsListResponse);

  //MENU CRUD
  rpc CreateMenu (CreateMenuRequest) returns (BaseResponse);
  rpc UpdateMenu (UpdateMenuRequest) returns (BaseResponse);
  rpc DeleteMenu (DeleteRequest) returns (BaseResponse);
  rpc GetMenuById (GetByIdRequest) returns (MenuResponse);
  rpc GetMenuList (GetListRequest) returns (GetMenuListResponse);
}

//MESSAGE DÙNG CHUNG 
message BaseResponse {
  bool success = 1;
  string message = 2;
  string id = 3;
}
message DeleteRequest { string id = 1; }
message GetByIdRequest { string id = 1; }
message GetListRequest { int32 page = 1; int32 page_size = 2; }

//MESSAGE CỦA NEWS
message CreateNewsRequest {
  string title = 1;
  string content = 2;
  string summary = 3;
  bool is_published = 4;
  repeated string menu_ids = 5; 
}

message UpdateNewsRequest {
  string news_id = 1;
  string title = 2;
  string content = 3;
  string summary = 4;
  bool is_published = 5;
  repeated string menu_ids = 6; 
}

message CreateNewsResponse { 
  string news_id = 1; 
  string message = 2; 
}

message GetNewsByIdRequest { 
  string news_id = 1; 
}

message GetNewsByIdResponse {
  string news_id = 1; 
  string title = 2; 
  string content = 3; 
  string summary = 4;
  bool is_published = 5; 
  string created_at = 6; 
  repeated MenuResponse menus = 7;
}

message GetNewsListRequest { 
  int32 page = 1; 
  int32 page_size = 2; 
}

message GetNewsListResponse { 
  repeated GetNewsByIdResponse items = 1; 
}

// MESSAGE CỦA MENU
message CreateMenuRequest {
  string name = 1;
  string slug = 2;
  int32 display_order = 3;
}

message UpdateMenuRequest {
  string menu_id = 1;
  string name = 2;
  string slug = 3;
  int32 display_order = 4;
}

message MenuResponse {
  string menu_id = 1;
  string name = 2;
  string slug = 3;
  int32 display_order = 4;
}

message GetMenuListResponse {
  repeated MenuResponse items = 1;
}